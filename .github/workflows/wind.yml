name: Update wind data

# Rafraîchit wind.json (station Wingreis) et le committe dans le repo.
# GitHub Pages sert ensuite ce fichier en same-origin → pas de problème CORS.

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 min (cadence réelle ~10-20 min selon la charge GitHub)
  workflow_dispatch:          # bouton "Run workflow" manuel
  push:
    branches: [main]          # régénère aussi à chaque push

# autorise le job à pousser le commit
permissions:
  contents: write

concurrency:
  group: wind-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # continue-on-error : une source temporairement KO ne casse pas le run ;
      # le JSON existant est conservé tel quel (les scripts n'écrivent qu'en cas de succès).
      - name: Fetch Wingreis wind data
        run: node scripts/fetch_wind.mjs
        continue-on-error: true

      - name: Fetch MeteoSwiss forecast (Ipsach)
        run: node scripts/fetch_forecast.mjs
        continue-on-error: true

      - name: Fetch bielersee.live cameras
        run: node scripts/fetch_cams.mjs
        continue-on-error: true

      - name: Downscale camera frames (limit repo churn)
        run: |
          sudo apt-get -qq update && sudo apt-get -qq install -y imagemagick
          mogrify -resize '1000x>' -quality 72 cam-*.jpg || true

      - name: Commit data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wind.json forecast.json cams.json cam-*.jpg
          if ! git diff --cached --quiet; then
            git commit -m "data: update wind.json + forecast.json + cameras"
            git push
          else
            echo "Aucun changement."
          fi
